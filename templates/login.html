{% extends "base.html" %}
{% block title %}Login - MediCycle AI{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>MediCycle AI</h1>
        <p class="soft-subtitle">Login to continue</p>
        <form method="POST">
            <input type="email" name="email" placeholder="Enter email" required><br><br>
            <input type="password" name="password" placeholder="Enter password" required><br><br>
            <button type="submit">Login</button>
        </form>
        <p class="auth-link">No account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</div>
{% endblock %}
