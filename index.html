<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCycle AI - Scan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; }
        .main-card { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #camera-container { display: none; margin-top: 20px; }
        #video { width: 100%; border-radius: 15px; background: #000; }
        .btn-camera { background: linear-gradient(45deg, #ff00cc, #3333ff); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; width: 100%; margin-bottom: 15px; }
        .btn-gallery { background: white; color: #3333ff; border: 2px solid #3333ff; padding: 15px 30px; border-radius: 50px; font-weight: bold; width: 100%; }
        .lang-switch { position: absolute; top: 15px; right: 15px; }
    </style>
</head>
<body>

<div class="lang-switch">
    <button onclick="setLang('en')" class="btn btn-sm btn-outline-primary">EN</button>
    <button onclick="setLang('mr')" class="btn btn-sm btn-outline-primary">मराठी</button>
</div>

<div class="container py-5">
    <div class="text-center mb-5">
        <h2 id="head-title" class="fw-bold text-primary">MediCycle AI</h2>
        <p id="head-sub" class="text-muted">Choose how you want to scan your medicine</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 main-card text-center">
            
            <div id="selection-area">
                <button onclick="startCamera()" class="btn-camera shadow">📸 <span id="b-cam">Open Camera</span></button>
                
                <form action="/upload" method="post" enctype="multipart/form-data" id="gallery-form">
                    <input type="file" name="medicine_image" id="file-input" class="d-none" accept="image/*" onchange="document.getElementById('gallery-form').submit()">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="btn-gallery">📁 <span id="b-gal">Upload from Gallery</span></button>
                </form>
            </div>

            <div id="camera-container">
                <video id="video" autoplay playsinline></video>
                <div class="d-flex gap-2 mt-3">
                    <button id="snap" class="btn btn-danger w-100 rounded-pill py-3 fw-bold">Capture Photo</button>
                    <button onclick="location.reload()" class="btn btn-secondary rounded-pill px-4">Back</button>
                </div>
                <canvas id="canvas" class="d-none"></canvas>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a href="/dashboard" class="text-decoration-none me-3">📊 Dashboard</a>
                <a href="/map" class="text-decoration-none">📍 Nearby Map</a>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const selectionArea = document.getElementById('selection-area');
    const cameraContainer = document.getElementById('camera-container');

    // १. कॅमेरा बटन दाबल्यावरच कॅमेरा चालू होईल
    function startCamera() {
        selectionArea.style.display = 'none';
        cameraContainer.style.display = 'block';

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { 
                alert("Camera access denied! Please allow camera in settings."); 
                location.reload();
            });
    }

    // २. फोटो कॅप्चर करणे
    document.getElementById('snap').onclick = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const dataUrl = canvas.toDataURL('image/jpeg');
        
        // AI Analysis साठी पाठवणे
        fetch('/analyze_captured_photo', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ image: dataUrl })
        })
        .then(res => res.json())
        .then(data => { window.location.href = "/upload_success?file=" + data.id; });
    };

    // ३. द्विभाषिक (Bilingual) लॉजिक
    const translations = {
        'en': { 'head-title': 'MediCycle AI', 'head-sub': 'Choose how you want to scan your medicine', 'b-cam': 'Open Camera', 'b-gal': 'Upload from Gallery' },
        'mr': { 'head-title': 'मेडिसायकल AI', 'head-sub': 'तुमचे औषध स्कॅन करण्याची पद्धत निवडा', 'b-cam': 'कॅमेरा उघडा', 'b-gal': 'गॅलरीतून फोटो अपलोड करा' }
    };

    function setLang(lang) {
        document.getElementById('head-title').innerText = translations[lang]['head-title'];
        document.getElementById('head-sub').innerText = translations[lang]['head-sub'];
        document.getElementById('b-cam').innerText = translations[lang]['b-cam'];
        document.getElementById('b-gal').innerText = translations[lang]['b-gal'];
    }
</script>

</body>
</html>
